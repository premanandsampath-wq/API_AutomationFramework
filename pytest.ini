[pytest]
pythonpath = .
testpaths = scr/tests scr/bdd/step_definition
bdd_features_base_dir = scr/bdd/features
log_cli = true
log_cli_level = INFO 
#log_file = scr/logs/test_run_%(asctime)s.log
#log_file_level = INFO
#log_file_format = %(asctime)s | %(levelname)s | %(message)s
#log_file_date_format = %Y-%m-%d_%H-%M-%S

markers =
    smoke: run smoke tests
    regression: run regression tests
    api: run API tests 
    ui: run UI tests
addopts = --html=reports/dummy.html --self-contained-html
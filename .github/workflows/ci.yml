name: API Automation CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run API tests
      run: |
        pytest -m api -s --html=reports/github_api_report.html --self-contained-html

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      with:
        name: api-test-report
        path: reports/github_api_report.html

    - name: Notify on failure
      if: failure()
      run: |
        echo "Tests failed. Sending notification..."
        # Example: Slack webhook or email action here

    - name: Deploy to STAGE
      if: success()
      run: |
        echo "Deploying to STAGE environment..."
        # Add your real deployment script here
